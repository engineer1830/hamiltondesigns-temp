<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gospel Topic Studies - Jesse Hamilton">
    <title>Jesse Hamilton Gospel Topic Studies and Thoughts</title>
    <meta name="author" content="Jesse Hamilton">

    <link rel="stylesheet" href="styles/gospeltopics.css" media="print" onload="this.media='all'">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" as="style"
        onload="this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    </noscript>
</head>

<body>

    <!-- ========================= -->
    <!--        DARK MODE          -->
    <!-- ========================= -->
    <label class="dark-toggle">
        <input type="checkbox" id="darkModeToggle">
        <span>Dark Mode</span>
    </label>

    <div class="layout">

        <!-- ========================= -->
        <!--        SIDEBAR            -->
        <!-- ========================= -->
        <aside class="sidebar">

            <header class="sidebar-header">
                <h1>Writings</h1>
                <input type="search" id="searchInput" placeholder="Search…" aria-label="Search writings">
            </header>

            <nav class="sidebar-nav" id="sidebarNav">
                <!-- JS will populate this -->
            </nav>

        </aside>

        <!-- ========================= -->
        <!--        MAIN CONTENT       -->
        <!-- ========================= -->
        <main class="content" id="contentArea">

            <!-- HOME PAGE CONTENT (only visible on index.html) -->
            <section id="homeContent">
                <article>
                    <h1>Jesse's Gospel Studies by Topic</h1>
                    <p>Select a topic from the sidebar to begin reading.</p>
                </article>

                <!-- CARD SEARCH -->
                <input type="search" id="cardSearch" placeholder="Search all writings…">

                <!-- CARD GRID -->
                <section class="card-grid" id="cardGrid"></section>

                <!-- PAGINATION -->
                <div id="pagination"></div>
            </section>

            <!-- WRITING PAGE CONTENT (only visible on writing pages) -->
            <section id="writingContent">
                <article id="markdownContent"></article>

                <section class="related">
                    <h2>Related Writings</h2>
                    <div id="relatedWritings"></div>
                </section>
            </section>

        </main>

    </div>

    <script src="scripts/gospeltopics.js"></script>
    <footer></footer>
</body>

</html>
