<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Social Media Positive</title>

    <link rel="stylesheet" href="../../styles/gospeltopics.css">
</head>

<body class="writing-page">

    <header class="top-header">
        <a href="/hamiltondesigns/gospeltopics/" class="home-link">← Back to Home</a>

        <label class="dark-toggle">
            <input type="checkbox" id="darkModeToggle">
            <span>Dark Mode</span>
        </label>
    </header>

    <div class="layout">

        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>Writings</h1>
                <input type="search" id="searchInput" placeholder="Search…" aria-label="Search writings">
                <button id="collapseAllBtn" class="collapse-all">Collapse All</button>
            </header>

            <nav class="sidebar-nav" id="sidebarNav"></nav>
        </aside>

        <main class="content">
            <article id="markdownContent"></article>

            <section class="related">
                <h2>Related Writings</h2>
                <div id="relatedWritings"></div>
            </section>
        </main>

    </div>

    <script src="/hamiltondesigns/gospeltopics/scripts/gospeltopics.js"></script>

</body>

</html>
